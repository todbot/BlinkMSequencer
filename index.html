<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>BlinkM Sequencer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Top control bar ──────────────────────────────────────────────── -->
  <div id="top-bar">
    <span class="top-label">TIMELINE</span>
    <span class="top-sub">click or drag to select · double-click to pick color</span>
    <div class="flex-gap"></div>
    <label class="top-ctl">
      LOOP <input type="checkbox" id="loop-check" checked>
    </label>
    <label class="top-ctl">
      SPEED
      <select id="speed-select">
        <option value="1">3 seconds</option>
        <option value="18">30 seconds</option>
        <option value="72">120 seconds</option>
      </select>
    </label>
  </div>

  <!-- ── Timeline ─────────────────────────────────────────────────────── -->
  <div id="timeline-wrap">
    <div id="timeline">
      <!-- 48 .slice divs and #playhead inserted by renderer.js -->
      <div id="playhead"></div>
    </div>
  </div>

  <!-- ── Lower area: palette | LED preview | controls ─────────────────── -->
  <div id="lower">

    <!-- Color swatch palette + color input -->
    <div id="palette-panel">
      <div id="swatch-grid"><!-- generated by renderer.js --></div>
      <div id="color-row">
        <span class="color-row-label">Color</span>
        <input type="color" id="color-picker" value="#373737">
        <input type="text"  id="hex-input"    value="#373737" maxlength="7" spellcheck="false">
      </div>
    </div>

    <!-- Simulated LED preview -->
    <div id="preview-panel">
      <div class="panel-heading">PREVIEW</div>
      <div id="led"></div>
    </div>

    <!-- Action buttons -->
    <div id="controls-panel">
      <button id="play-btn" class="btn-action">▶  Play</button>
      <div class="btn-row">
        <button id="upload-btn"   class="btn-action btn-half">↑  Upload to BlinkM</button>
        <button id="download-btn" class="btn-action btn-half">↓  Download from BlinkM</button>
      </div>
      <hr class="ctrl-sep">
      <div class="btn-row">
        <button id="open-btn" class="btn-secondary btn-half">Open…</button>
        <button id="save-btn" class="btn-secondary btn-half">Save…</button>
      </div>
      <hr class="ctrl-sep">
      <button id="connect-btn" class="btn-secondary">Connect LinkM</button>
    </div>

  </div>

  <!-- ── Upload progress overlay ──────────────────────────────────────── -->
  <div id="overlay" class="hidden">
    <div id="overlay-box">
      <p id="overlay-msg"></p>
      <progress id="overlay-progress" max="48" value="0"></progress>
      <p id="overlay-sub"></p>
      <button id="overlay-ok" class="hidden btn-secondary">OK</button>
    </div>
  </div>

  <!-- ── Status bar ───────────────────────────────────────────────────── -->
  <div id="status-bar">
    <span>version 0.1.0 &copy; ThingM Corporation</span>
    <span id="conn-status" class="disconnected">No LinkM, Disconnected</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
